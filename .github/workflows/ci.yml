name: CI – Build & Test

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

# Cancel in-flight runs for the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – Compile and run host-based unit tests
  # ---------------------------------------------------------------------------
  host-tests:
    name: Host Unit Tests (g++)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # App + State-machine tests
      # -----------------------------------------------------------------------
      - name: Compile – test_app
        run: |
          g++ -std=c++14 -Wall -Wextra -Wpedantic \
              -I tests -I include \
              tests/Arduino.cpp \
              src/App.cpp \
              src/ColorSensor.cpp \
              src/MotorController.cpp \
              src/IrSensor.cpp \
              src/Telemetry.cpp \
              tests/test_app.cpp \
              -o tests/run_test_app

      - name: Run – test_app
        run: ./tests/run_test_app

      # -----------------------------------------------------------------------
      # Color-Sensor classification tests
      # -----------------------------------------------------------------------
      - name: Compile – test_sensor
        run: |
          g++ -std=c++14 -Wall -Wextra -Wpedantic \
              -I tests -I include \
              tests/Arduino.cpp \
              src/ColorSensor.cpp \
              tests/test_sensor.cpp \
              -o tests/run_test_sensor

      - name: Run – test_sensor
        run: ./tests/run_test_sensor

      # -----------------------------------------------------------------------
      # Motor-controller PWM / direction tests
      # -----------------------------------------------------------------------
      - name: Compile – test_motor
        run: |
          g++ -std=c++14 -Wall -Wextra -Wpedantic \
              -I tests -I include \
              tests/Arduino.cpp \
              src/MotorController.cpp \
              tests/test_motor.cpp \
              -o tests/run_test_motor

      - name: Run – test_motor
        run: ./tests/run_test_motor

      # -----------------------------------------------------------------------
      # IR-sensor debounce tests
      # -----------------------------------------------------------------------
      - name: Compile – test_ir
        run: |
          g++ -std=c++14 -Wall -Wextra -Wpedantic \
              -I tests -I include \
              tests/Arduino.cpp \
              src/IrSensor.cpp \
              tests/test_ir.cpp \
              -o tests/run_test_ir

      - name: Run – test_ir
        run: ./tests/run_test_ir

  # ---------------------------------------------------------------------------
  # Job 2 – Static analysis with cppcheck
  # ---------------------------------------------------------------------------
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck on src/
        run: |
          cppcheck \
            --enable=all \
            --std=c++14 \
            --language=c++ \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            -I include \
            src/

      - name: Run cppcheck on tests/
        run: |
          cppcheck \
            --enable=all \
            --std=c++14 \
            --language=c++ \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            -I include -I tests \
            tests/*.cpp

  # ---------------------------------------------------------------------------
  # Job 3 – Code style check with clang-format
  # ---------------------------------------------------------------------------
  code-style:
    name: Code Style (clang-format)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting – src/
        run: |
          clang-format --dry-run --Werror \
            src/*.cpp src/*.h include/*.h

      - name: Check formatting – tests/
        run: |
          clang-format --dry-run --Werror \
            tests/*.cpp tests/Arduino.h
